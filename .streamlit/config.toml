[theme]
base = "light"
primaryColor = "#FF2442"               # 小红书红 — 主按钮 / 选中态 / 滑块
backgroundColor = "#FFFFFF"            # 主背景
secondaryBackgroundColor = "#FFF7F8"   # 浅粉 — sidebar / metric / expander 等次要面板
textColor = "#1F1F1F"                  # 主文字色
font = "sans serif"

# 注意：不要在这里设 [server].port 或 headless。
# - 云端 Streamlit Cloud 健康检查走默认 8501，硬设端口会导致 health check 失败
# - 本地开发的端口和 headless 由 start.bat 命令行参数控制（--server.port 8502）
